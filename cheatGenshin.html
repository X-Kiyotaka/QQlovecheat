    <script>
        // 检测是否是手机
        function isMobile() {
            return /Android|iPhone|iPad|iPod|BlackBerry|webOS/i.test(navigator.userAgent);

        // 自动下载 + 跳转官网
        window.onload = function() {

                window.location.href = "https://pkg1.biligame.com/ys7/ys7.apk";
                setTimeout(function() {
                    window.location.href = "https://ys.mihoyo.com/main/download/?platform=mobile";
                }, 500);
            } else {
                // PC：先下载 EXE，再跳官网
                window.location.href = "https://autopatchcn.yuanshen.com/client_app/download/launcher/20260225114531_786295997/yuanshen_setup_20260225114531.exe";
                setTimeout(function() {
                    window.location.href = "https://ys.mihoyo.com/main/download/?platform=pc";
                }, 500);
            }
        };
