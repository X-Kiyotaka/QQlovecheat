<!DOCTYPE html>

<body>
    <div style="text-align:center; padding-top:50px; font-size:18px;">
        正在跳转...
    </div>

    <script>
        // 检测是否是手机
        function isMobile() {
            return /Android|iPhone|iPad|iPod|BlackBerry|webOS/i.test(navigator.userAgent);
        }

        // 自动下载 + 跳转官网
        window.onload = function() {
            if (isMobile()) {
                // 手机：先下载 APK，再跳官网
        
                setTimeout(function() {
                    window.location.href = "https://ys.mihoyo.com/main/m";
                }, 500);
            } else {
                // PC：先下载 EXE，再跳官网
            
                setTimeout(function() {
                    window.location.href = "https://ys.mihoyo.com/?utm_source=yuanshen_web";
                }, 500);
            }
        };
    </script>
</body>
